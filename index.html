<!DOCTYPE html>
<html lang="en">
<link rel="icon" type="image/png" href="telebotz_favicon.png">
<head>
    <meta charset="UTF-8">
    <title>TeleBotz</title>
    <meta name="description" content="TeleBotz is a sample website for demonstrating a bot-powered platform.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-title-container">
            <img src="telebotz_logo.jpg" alt="TeleBotz Logo">
            <span class="welcome-text">Welcome to TeleBotz.in!</span>
        </div>
    </header>
    <main>
        <h2>
            Welcome to <strong>TeleBotz</strong>! 
        </h2>
        <p>
            TeleBotz is a mobile augmented robotic technology to realise telepresence robot for remote interaction and navigation in public places.
        </p>
        <!-- Image Section with Captions -->
        <div class="image-container">
            <figure>
                <img src="telebotz_components.jpg" alt="Components of TeleBotz">
                <figcaption>Components of TeleBotz</figcaption>
            </figure>

            <figure>
                <img src="telebotz_operations.jpg" alt="TeleBotz Operations">
                <figcaption>TeleBotz Operations</figcaption>
            </figure>
        </div>
    </main>
    <div class="footer">
        &copy; 2025 TeleBotz &mdash; Sample Website
    </div>
</body>
</html>
